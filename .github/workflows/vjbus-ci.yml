name: vjbus-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/be4-vjbus/**"
      - "frontend/fe4-vjbus/**"
      - "deploy/docker-compose.vjbus.yml"
      - ".github/workflows/vjbus-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/be4-vjbus/**"
      - "frontend/fe4-vjbus/**"
      - ".github/workflows/vjbus-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─── BACKEND ─────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend/be4-vjbus
        run: |
          pip install eventlet flask flask_cors flask_socketio flake8

      - name: Lint backend
        working-directory: backend/be4-vjbus
        run: |
          flake8 . --max-line-length=120 \
                   --exclude=__pycache__,vjbus_env,venv \
                   --ignore=E501,W503

      # ─── FRONTEND ────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend/fe4-vjbus
        run: |
          pip install eventlet flask flask_cors flask_socketio flake8

      - name: Lint frontend
        working-directory: frontend/fe4-vjbus
        run: |
          flake8 . --max-line-length=120 \
                   --exclude=__pycache__,vjbus_env,venv \
                   --ignore=E501,W503

  deploy:
    needs: lint
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy vjbus containers
        run: |
          docker compose -f deploy/docker-compose.vjbus.yml down
          docker compose -f deploy/docker-compose.vjbus.yml up -d --build
          docker image prune -f
          docker compose -f deploy/docker-compose.vjbus.yml ps