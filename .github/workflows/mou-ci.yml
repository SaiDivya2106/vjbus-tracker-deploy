name: mou-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/be6-mou/**"
      - "frontend/fe6-mou/**"
      - "deploy/docker-compose.mou.yml"
      - ".github/workflows/mou-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/be6-mou/**"
      - "frontend/fe6-mou/**"
      - ".github/workflows/mou-ci.yml"

jobs:
  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: backend/be6-mou
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend/fe6-mou
        run: npm install

      - name: Build frontend (lint runs as part of CRA build)
        working-directory: frontend/fe6-mou
        env:
          CI: false
        run: npm run build

  deploy:
    needs: build-check
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          docker compose -f deploy/docker-compose.mou.yml down
          docker compose -f deploy/docker-compose.mou.yml up -d --build
          docker image prune -f
          docker compose -f deploy/docker-compose.mou.yml ps