name: wall-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/be5-wall/**"
      - "frontend/fe5-wall/**"
      - "deploy/docker-compose.wall.yml"
      - ".github/workflows/wall-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/be5-wall/**"
      - "frontend/fe5-wall/**"
      - ".github/workflows/wall-ci.yml"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── BACKEND ─────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend/be5-wall
        run: npm install

      - name: Lint backend
        working-directory: backend/be5-wall
        run: npm run lint

      # ─── FRONTEND ────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend/fe5-wall
        run: npm install

      - name: Lint frontend
        working-directory: frontend/fe5-wall
        run: npm run lint

  deploy:
    needs: lint
    if: github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          docker compose -f deploy/docker-compose.wall.yml down
          docker compose -f deploy/docker-compose.wall.yml up -d --build
          docker image prune -f
          docker compose -f deploy/docker-compose.wall.yml ps