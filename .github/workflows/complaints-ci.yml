name: complaints-ci

on:
  push:
    branches: [main]
    paths:
      - "backend/be1-complaints/**"
      - "frontend/fe1-complaints/**"
      - "deploy/docker-compose.complaints.yml"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/be1-complaints/**"
      - "frontend/fe1-complaints/**"
      - ".github/workflows/**"

jobs:
  lint:
    runs-on: ubuntu-latest        # ← GitHub's server for lint (free & fast)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # ─── BACKEND ───────────────────────────────────────────
      - name: Install backend dependencies
        working-directory: backend/be1-complaints
        run: npm install

      - name: Lint backend
        working-directory: backend/be1-complaints
        run: npm run lint

      # ─── FRONTEND ──────────────────────────────────────────
      - name: Install frontend dependencies
        working-directory: frontend/fe1-complaints
        run: npm install

      - name: Lint frontend
        working-directory: frontend/fe1-complaints
        run: npm run lint

  deploy:
    needs: lint                   # ← only deploy if lint passes
    if: github.event_name == 'push'
    runs-on: self-hosted          # ← your server builds + deploys directly
    steps:
      - uses: actions/checkout@v4

      - name: Build and Deploy
        run: |
          docker compose -f deploy/docker-compose.complaints.yml down
          docker compose -f deploy/docker-compose.complaints.yml up -d --build
          docker image prune -f
          docker compose -f deploy/docker-compose.complaints.yml ps