name: vjstartups-app

services:
  mongodb:
    image: mongo:7
    container_name: vjstartups-mongo
    restart: unless-stopped
    ports:
      - "27321:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - vjstartups-mongodata:/data/db
    networks:
      - vjstartups-network

  backend:
    build:
      context: ../backend/be2-vjstartups
      dockerfile: Dockerfile
    container_name: vjstartups-backend
    restart: unless-stopped
    ports:
      - "5003:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - mongodb
    networks:
      - vjstartups-network

  frontend:
    build:
      context: ../frontend/fe2-vjstartups
      dockerfile: Dockerfile
    container_name: vjstartups-frontend
    restart: unless-stopped
    ports:
      - "3313:80"
    depends_on:
      - backend
    networks:
      - vjstartups-network

volumes:
  vjstartups-mongodata:

networks:
  vjstartups-network:
    driver: bridge