name: complaints-app

services:
  mongo:
    image: mongo:7
    container_name: complaints-mongo
    ports:
      - "27318:27017"
    volumes:
      - /home/campus/complaints-mongodata:/data/db
    restart: unless-stopped
    networks:
      - complaints-network       # ← add this

  backend:
    build:
      context: ../backend/be1-complaints
    container_name: complaints-backend
    ports:
      - "6309:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/complaintsdb
      - PORT=5000
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - complaints-network       # ← add this

  frontend:
    build:
      context: ../frontend/fe1-complaints
      args:
        VITE_API_URL: https://complaints.vjstartup.com/be/api
    container_name: complaints-frontend
    ports:
      - "3309:5173"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - complaints-network       # ← add this

networks:
  complaints-network:
    driver: bridge               # ← add this whole block