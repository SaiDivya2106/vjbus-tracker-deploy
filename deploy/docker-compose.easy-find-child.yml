name: easyfind-child-app

services:
  mongodb:
    image: mongo:7
    container_name: lostandfound-mongo
    restart: unless-stopped
    ports:
      - "27319:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - lostandfound-mongodata:/data/db
    networks:
      - lostandfound-network

  redis:
    image: redis:7-alpine
    container_name: lostandfound-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - lostandfound-redisdata:/data
    networks:
      - lostandfound-network

  backend:
    build:
      context: ../backend/be9-easyfind        # ← changed
      dockerfile: Dockerfile
    container_name: lostandfound-backend
    restart: unless-stopped
    ports:
      - "5001:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - EMAIL_USER=${EMAIL_USER}
      - EMAIL_PASS=${EMAIL_PASS}
    depends_on:
      - mongodb
      - redis
    networks:
      - lostandfound-network

  frontend:
    build:
      context: ../frontend/fe9-easyfind-child  # ← changed
      dockerfile: Dockerfile
    container_name: lostandfound-frontend
    restart: unless-stopped
    ports:
      - "3310:80"
    depends_on:
      - backend
    networks:
      - lostandfound-network

volumes:
  lostandfound-mongodata:
  lostandfound-redisdata:

networks:
  lostandfound-network:
    driver: bridge