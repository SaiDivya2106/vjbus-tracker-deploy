name: mou-app

services:
  mou-backend:
    build:
      context: ../backend/be6-mou
      dockerfile: Dockerfile
    container_name: mou-backend
    restart: unless-stopped
    ports:
      - "5005:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_URL=${MOU_FRONTEND_URL}
    volumes:
      - ../backend/be6-mou/data:/app/data
    networks:
      - mou-network

  mou-frontend:
    build:
      context: ../frontend/fe6-mou
      dockerfile: Dockerfile
    container_name: mou-frontend
    restart: unless-stopped
    ports:
      - "3315:80"
    depends_on:
      - mou-backend
    networks:
      - mou-network

networks:
  mou-network:
    driver: bridge