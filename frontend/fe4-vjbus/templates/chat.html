<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Chat</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../static/css/chat-styles.css">
</head>
<body>

<div class="chat-container">
    <!-- WhatsApp-like header -->
    <div class="whatsapp-header" id="initial-header">
        <h5 id="bus-chat-header">BUS CHAT</h5>
        <i class="fa-solid fa-house to-home" onclick="window.location.href='/'"> </i>
    </div>

    <!-- WhatsApp-like chat header -->
    <div class="whatsapp-chat-header" id="chat-header" style="display:none;">
        <div class="chat-header-info">
            <div class="chat-contact">
                <div class="contact-avatar">
                    <i class="fas fa-bus"></i>
                </div>
                <div class="contact-details">
                    <div class="contact-name">Chat <span id="room-name"></span></div>
                </div>
            </div>
            <div class="chat-header-actions">
                <i class="fas fa-sign-out-alt" id="leave-chat-btn" onclick="leaveRoom()"></i>
            </div>
        </div>
    </div>

    <!-- Chat area -->
    <div id="chat" style="display:none;">
        <div class="chat-messages" id="messages">
            <!-- Messages will be displayed here -->
        </div>
        
        <!-- Message input area -->
        <div class="message-input-area">
            <div class="input-container">
                <input type="text" id="message" class="message-input" placeholder="Type a message" onkeydown="sendOnEnter(event)">
            </div>
            <button class="send-button" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Chat list section -->
    <div id="chat-list-section" style="display:none;">
        <div class="chat-list-header">
            <h5>Select a Chat</h5>
        </div>
        <div class="chat-list-container">
            <div id="chat-list">
                <!-- Chat rooms will be displayed here -->
            </div>
        </div>
        <button class="btn btn-primary new-chat-float" id="new-chat-btn">
            <i class="fas fa-plus"></i>
        </button>
    </div>

    <!-- Join section -->
    <div id="join-section">
        <input type="text" id="name" class="form-control mb-2" placeholder="Enter your name" onkeydown="focusNext(event, 'route')">
        <input type="text" id="route" class="form-control mb-2" placeholder="Enter Room ID" onkeydown="focusNext(event, 'join')">
        <button class="btn btn-success w-100" id="join" onclick="joinRoom()">Join Chat</button>
    </div>

    <!-- New chat section -->
    <div id="new-chat-section" style="display:none;">
        <h5>Create New Chat</h5>
        <input type="text" id="new-chat-name" class="form-control mb-2" placeholder="Enter chat name">
        <button class="btn btn-success w-100" id="create-chat">Create Chat</button>
        <button class="btn btn-secondary w-100 mt-2" id="cancel-new-chat">Cancel</button>
    </div>
</div>

<script src="../static/js/chat.js"></script>
</body>
</html>
