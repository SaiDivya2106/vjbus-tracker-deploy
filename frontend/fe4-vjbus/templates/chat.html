<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Chat</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="../static/css/chat-styles.css">
</head>

<body>

<div class="chat-container">

    <!-- ================= JOIN PAGE ================= -->

    <div id="join-section" class="join-screen">

        <div class="title-box">
            <h2>BUS CHAT</h2>
        </div>

        <input
            type="text"
            id="name"
            class="join-input"
            placeholder="Enter Your Name"
            onkeydown="focusNext(event,'route')">

        <input
            type="text"
            id="route"
            class="join-input"
            placeholder="Enter Bus Number"
            onkeydown="focusNext(event,'join')">

        <button
            id="join"
            class="join-button"
            onclick="joinRoom()">

            Join Chat

        </button>

    </div>

    <!-- ================= CHAT PAGE ================= -->

    <div id="chat-page" style="display:none;">

        <!-- Header -->

        <div class="chat-header">

            <div class="chat-title">

                <h2>BUS CHAT</h2>

                <p>
                    ROOM ID :
                    <span id="room-name"></span>
                </p>

            </div>

            <button
                id="leave-btn"
                class="leave-btn"
                onclick="leaveRoom()">

                Leave

            </button>

        </div>

        <!-- Messages -->

        <div
            id="messages"
            class="chat-messages">

        </div>

        <!-- Message Box -->

        <div class="message-input-area">

            <input
                type="text"
                id="message"
                class="message-input"
                placeholder="Type a message..."
                onkeydown="sendOnEnter(event)">

            <button
                class="send-button"
                onclick="sendMessage()">

                <i class="fas fa-paper-plane"></i>

            </button>

        </div>

    </div>

</div>

<!-- ================= BOTTOM NAVIGATION ================= -->

<div class="bottom-navigation">

    <div
        class="nav-item"
        onclick="window.location.href='/'">

        <i class="fas fa-house"></i>

    </div>

    <div class="nav-item active">

        <i class="fas fa-comments"></i>

    </div>

</div>
<script src="../static/js/chat.js"></script>

</body>
</html>
