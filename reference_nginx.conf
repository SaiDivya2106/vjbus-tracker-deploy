user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;



events {
    worker_connections 768;
}

http {

    log_format custom '$host $remote_addr [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log custom;

    include /etc/nginx/sites-available/expo.vnrzone.site;
    
    
    # Define a shared memory zone "one" for rate limiting
    limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

    # Server for 103.248.208.119 (if still needed)
    server {
        listen 80;
        server_name 103.248.208.119;

	location /api/ {
            proxy_pass http://10.45.8.187:5001/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control no-cache; # If needed
        }

        # ... (location blocks for 103.248.208.119 if any)
    }  # End of server block for 103.248.208.119


    # Server for bus.vnrzone.site (port 3104)
server {
    listen 443 ssl;
    server_name bus.vnrzone.site;

    ssl_certificate /etc/letsencrypt/live/bus.vnrzone.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bus.vnrzone.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3104/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:6104;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bus-be/ {
        proxy_pass http://127.0.0.1:6104/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

